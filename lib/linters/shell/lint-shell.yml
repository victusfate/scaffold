# scaffold-linter: shell
name: Lint Shell

on:
  pull_request:
    paths:
      - '**/*.sh'
      - '**/*.bash'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          # Gate on real bugs; info-level style (e.g. SC2015) stays advisory.
          severity: warning
