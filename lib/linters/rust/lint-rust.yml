# scaffold-linter: rust
name: Lint Rust

on:
  pull_request:
    paths:
      - '**/*.rs'

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings
