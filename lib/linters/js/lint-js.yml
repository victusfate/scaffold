# scaffold-linter: js
name: Lint JS/TS

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.ts'
      - '**/*.tsx'

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --save-dev eslint @eslint/js typescript-eslint globals
      - run: npx eslint .
