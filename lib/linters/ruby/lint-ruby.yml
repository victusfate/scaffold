# scaffold-linter: ruby
name: Lint Ruby

on:
  pull_request:
    paths:
      - '**/*.rb'

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: gem install rubocop
      - run: rubocop
