# scaffold-linter: elixir
name: Lint Elixir

on:
  pull_request:
    paths:
      - '**/*.ex'
      - '**/*.exs'

jobs:
  credo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'
      - run: mix deps.get
      - run: mix credo --strict
