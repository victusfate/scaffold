name: Version Bump

# Bumps package.json on the PR branch (never on main) so the version change is
# part of the PR and reviewed with it. The bump is derived from conventional
# commits the PR adds on top of main, via scripts/compute-bump.mjs (unit-tested).
# The base version comes from main's package.json — not the PR branch's — so a
# branch cut from an older main still bumps relative to the current release.
# Tagging happens separately in release.yml on merge to main.

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  version-bump:
    runs-on: ubuntu-latest
    # Fork PRs get a read-only token and the head branch lives in the fork —
    # skip instead of failing on push.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        run: |
          git fetch origin main --quiet

          # Bump at most once per branch: if a release commit already exists on
          # this branch since it diverged from main, there is nothing to do. This
          # also breaks the re-trigger loop when our own bump push fires synchronize.
          if git log origin/main..HEAD --format=%s | grep -q '^chore(release):'; then
            echo "Branch already bumped — skipping"
            exit 0
          fi

          # Base the bump on main's current version, not the PR branch's, so a
          # branch cut from an older main bumps relative to the latest release.
          BASE=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")

          # Conventional-commit subjects + bodies this PR adds on top of main.
          NEXT=$(git log origin/main..HEAD --pretty='%s%n%b' | node scripts/compute-bump.mjs "$BASE")

          if [ "$NEXT" = "none" ]; then
            echo "No release-worthy commits since main ($BASE) — skipping"
            exit 0
          fi

          npm version "$NEXT" --no-git-tag-version
          echo "Bumped $BASE -> $NEXT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          # No [skip ci]: the bump commit becomes the PR head SHA, so it must get
          # a CI run or required status checks will stall (or merge untested).
          # The chore(release): last-commit guard above breaks the re-trigger loop.
          git commit -m "chore(release): bump version to $NEXT"
          # A concurrent push to this branch would cause a non-fast-forward
          # reject — rebase onto the remote head before pushing.
          git pull --rebase origin "$GITHUB_HEAD_REF"
          git push
