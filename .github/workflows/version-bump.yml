name: Version Bump

# Bumps package.json once per merge to main (not once per PR push) and tags
# the release. The bump is derived from conventional commits since the last
# version-change commit, via scripts/compute-bump.mjs (unit-tested).
# Bot pushes use GITHUB_TOKEN, which does not retrigger workflows.

on:
  push:
    branches:
      - main

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute and apply version bump
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")

          # Range: commits since the last bump commit (or all history pre-first-bump)
          LAST_BUMP=$(git log --grep='^chore: bump version' --pretty=%H -1 || true)
          RANGE="${LAST_BUMP:+$LAST_BUMP..}HEAD"

          NEXT=$(git log "$RANGE" --pretty='%s%n%b' | node scripts/compute-bump.mjs "$CURRENT")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

          if [ "$NEXT" = "none" ]; then
            echo "No release-worthy commits since last bump ($CURRENT)."
            exit 0
          fi

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEXT';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Bumped $CURRENT -> $NEXT"

      - name: Commit and tag
        if: steps.bump.outputs.next != 'none'
        run: |
          NEXT=${{ steps.bump.outputs.next }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to $NEXT"
          git tag "v$NEXT"
          git push --follow-tags
