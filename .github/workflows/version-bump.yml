name: Version Bump

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine version bump
        id: bump
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          COMMITS=$(git log "$BASE".."$HEAD" --pretty=format:"%s %b")

          BUMP="none"
          while IFS= read -r line; do
            if echo "$line" | grep -qE '(BREAKING CHANGE|feat!:|fix!:)'; then
              BUMP="major"
              break
            elif echo "$line" | grep -qE '^feat(\(.*\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$line" | grep -qE '^fix(\(.*\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.bump.outputs.bump != 'none'
        run: |
          BUMP=${{ steps.bump.outputs.bump }}
          CURRENT=$(node -p "require('./package.json').version")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "Bumped $CURRENT → $NEW ($BUMP)"

      - name: Commit version bump
        if: steps.bump.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push
